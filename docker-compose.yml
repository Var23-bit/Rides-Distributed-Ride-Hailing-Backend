version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ridehail
    ports:
      - "5434:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ridehail"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    environment:
      - PORT=3010
      - DATABASE_URL=postgres://admin:password@postgres:5432/ridehail
      - JWT_SECRET=local-dev-secret-change-me
      - ACCESS_TOKEN_TTL=15m
      - REFRESH_TOKEN_TTL=30d
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    ports:
      - "8081:80"
    environment:
      - PORT=80
      - RIDE_SERVICE_URL=http://ride-service:3001
      - LOCATION_SERVICE_URL=http://location-service:3002
      - FARE_SERVICE_URL=http://fare-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3008
      - JWT_SECRET=local-dev-secret-change-me
    depends_on:
      - auth-service
      - ride-service
      - location-service
      - fare-service
      - payment-service

  ride-service:
    build:
      context: .
      dockerfile: ./services/ride-service/Dockerfile
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://admin:password@postgres:5432/ridehail
      - REDIS_URL=redis://redis:6379
      - LOCATION_SERVICE_URL=http://location-service:3002
      - FARE_SERVICE_URL=http://fare-service:3003
      - JWT_SECRET=local-dev-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  location-service:
    build:
      context: .
      dockerfile: ./services/location-service/Dockerfile
    environment:
      - PORT=3002
      - DATABASE_URL=postgres://admin:password@postgres:5432/ridehail
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=local-dev-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  fare-service:
    build:
      context: .
      dockerfile: ./services/fare-service/Dockerfile
    environment:
      - PORT=3003
      - DATABASE_URL=postgres://admin:password@postgres:5432/ridehail
      - JWT_SECRET=local-dev-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    environment:
      - PORT=3008
      - DATABASE_URL=postgres://admin:password@postgres:5432/ridehail
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=local-dev-secret-change-me
      - RAZORPAY_KEY_ID=rzp_test_T9mKmJmtAdPYIy
      - RAZORPAY_KEY_SECRET=dRGlpQUZjyhCw225pZ053iGH
      - RAZORPAY_WEBHOOK_SECRET=REPLACE_ME
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  history-service:
    build:
      context: .
      dockerfile: ./services/history-service/Dockerfile
    environment:
      - DATABASE_URL=postgres://admin:password@postgres:5432/ridehail
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=local-dev-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
